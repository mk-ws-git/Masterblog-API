<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Blog Posts</h1>

        <div class="input-field">
            <input
                type="text"
                id="api-base-url"
                placeholder="Enter API Base URL"
                value="http://127.0.0.1:5002/api"
            >
            <button onclick="loadPosts()">Load Posts</button>
        </div>

        <div class="input-field">
            <input type="text" id="post-title" placeholder="Enter Post Title">
            <input type="text" id="post-content" placeholder="Enter Post Content">
            <button onclick="addPost()">Add Post</button>
        </div>

        <div id="message"></div>
        <div id="post-container"></div>
    </div>

    <script>
        async function loadPosts() {
            const baseUrl = document.getElementById("api-base-url").value.trim();
            const message = document.getElementById("message");
            const container = document.getElementById("post-container");

            message.textContent = "";
            container.innerHTML = "";

            try {
                const response = await fetch(`${baseUrl}/posts`);

                if (!response.ok) {
                    throw new Error(`Failed to load posts: ${response.status}`);
                }

                const posts = await response.json();

                if (!Array.isArray(posts) || posts.length === 0) {
                    container.innerHTML = "<p>No posts found.</p>";
                    return;
                }

                posts.forEach(post => {
                    const div = document.createElement("div");
                    div.className = "post-card";

                    div.innerHTML = `
                        <h2>${post.title}</h2>
                        <p>${post.content}</p>
                        <small>ID: ${post.id}</small>
                    `;

                    container.appendChild(div);
                });
            } catch (error) {
                message.textContent = error.message;
            }
        }

        async function addPost() {
            const baseUrl = document.getElementById("api-base-url").value.trim();
            const titleInput = document.getElementById("post-title");
            const contentInput = document.getElementById("post-content");
            const message = document.getElementById("message");

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            message.textContent = "";

            if (!title || !content) {
                message.textContent = "Title and content are required.";
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/posts`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.missing_fields) {
                        message.textContent = `Missing fields: ${data.missing_fields.join(", ")}`;
                    } else if (data.error) {
                        message.textContent = data.error;
                    } else {
                        message.textContent = "Failed to add post.";
                    }
                    return;
                }

                titleInput.value = "";
                contentInput.value = "";
                message.textContent = "Post added successfully.";

                loadPosts();
            } catch (error) {
                message.textContent = error.message;
            }
        }

        loadPosts();
    </script>
</body>
</html>
